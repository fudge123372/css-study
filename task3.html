
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .navbar{
            background-color: aquamarine;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 0 0 20px;
            border-radius: 6px;
        }
        .navbar a{
            color: black;
            text-decoration:none;
            margin: 0 20px 0 0; 
        }
        .navbar .list{
            list-style:none ;
            display: flex;
            gap: 30px;
        }
        .list li:last-child a {
            color: white;
            background-color: black;
            padding: 5px 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="">logobakery</a>
        <ul class="list">
            <li><a href="">services</a></li>
            <li><a href="">projects</a></li>
            <li><a href="">about</a></li>
            <li><a href="">contact</a></li>           
        </ul>

    </div>
</body>
</html>
