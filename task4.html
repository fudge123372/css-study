<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .navbar{
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: yellowgreen;
            padding: 5px 10px;
            border-radius: 8px;
            color: white;
        }
        .left{
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .back{
            background-color: black;
            padding: 10px 14px;
            border-radius: 50%;
            color: white;
        }
        .left a {
            text-decoration: none;
            color: blue;
            font-size: 14px;
        }
        .contact{
            background-color: red;
            color: white;
            padding: 6px 15px;
            border-radius: 15px;
        }
        .logo{
            font-weight: bold;
            font-size: 20px;
        }
        .list{
            display:flex;
            gap: 25px;
            list-style: none;
        }
    </style>
</head>
<body>
    <div class="left">
        <span class="back"></span>
        <ul class="list">
            <li><a href="">services</a></li>
            <li><a href="">projects</a></li>
            <li><a href="">about</a></li>
            <li><a href="" class="contact">contact</a></li>
        </ul>
    </div>
    <div class="logo">LOGOBAKERY</div>
</body>
</html>
